<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>NeuronDrive — AI Vehicle Intelligence by Red Box Performance</title>
    <meta name="description" content="NeuronDrive by Red Box Performance is the AI-powered vehicle cockpit that connects to your car via Bluetooth or WiFi. Live OBD telemetry, AI fault diagnostics, predictive maintenance, and ECU map vault. Engineered to perform." />
    <meta name="keywords" content="OBD scanner, car diagnostics, AI mechanic, vehicle health, live car data, Bluetooth OBD, VLinker BM+, ECU tuning, predictive maintenance, BMW diagnostics, Audi diagnostics, performance tuning, NeuronDrive, Red Box Performance" />
    <meta name="author" content="Red Box Performance" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://neurodrive.redboxperformance.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neurodrive.redboxperformance.com/" />
    <meta property="og:title" content="NeuronDrive — Engineered to Perform | Red Box Performance" />
    <meta property="og:description" content="The AI brain behind your car. Real-time OBD telemetry, fault diagnostics, predictive maintenance, and performance coaching — straight from your browser via Bluetooth or WiFi." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:site_name" content="NeuronDrive by Red Box Performance" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@redboxperformance" />
    <meta name="twitter:creator" content="@redboxperformance" />
    <meta name="twitter:title" content="NeuronDrive — AI Vehicle Intelligence" />
    <meta name="twitter:description" content="Live OBD telemetry, AI diagnostics, and predictive maintenance for your car. No app needed — works right in the browser." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#DC2626" />
    <meta name="application-name" content="NeuronDrive" />
    <meta name="apple-mobile-web-app-title" content="NeuronDrive" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Red Box Performance",
      "alternateName": "NeuronDrive",
      "url": "https://neurodrive.redboxperformance.com",
      "logo": "https://neurodrive.redboxperformance.com/logo.png",
      "description": "Red Box Performance delivers elite tuning, advanced diagnostics, and real-world performance solutions for drivers who demand more.",
      "sameAs": [
        "https://twitter.com/redboxperformance",
        "https://instagram.com/redboxperformance"
      ]
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NeuronDrive",
      "operatingSystem": "Web Browser",
      "applicationCategory": "AutomotiveApplication",
      "description": "AI-powered vehicle intelligence platform with live OBD telemetry, fault diagnostics, predictive maintenance, and ECU map vault.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1247"
      },
      "featureList": [
        "Live OBD telemetry via Bluetooth and WiFi",
        "AI fault code diagnostics",
        "Predictive component maintenance",
        "ECU stock map vault",
        "Performance coaching (0-100, dyno)",
        "Real-time anomaly detection"
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What OBD adapters does NeuronDrive support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuronDrive works with any ELM327-compatible Bluetooth LE or WiFi OBD-II adapter, including the VLinker BM+, Viecar, and similar devices. No installation required — just pair and connect in the browser."
          }
        },
        {
          "@type": "Question",
          "name": "Which car brands does NeuronDrive support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NeuronDrive supports all OBD-II compatible vehicles manufactured after 1996, including BMW, Mercedes-Benz, Audi, Volkswagen, Toyota, Honda, Ford, Porsche, Nissan, Subaru, Hyundai, Kia, Ferrari, and more."
          }
        },
        {
          "@type": "Question",
          "name": "Does NeuronDrive require an internet connection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The OBD connection works entirely locally over Bluetooth or WiFi. AI diagnostics use the NeuronDrive cloud API for advanced fault analysis."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
